<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeechLab | Practice Impromptu Speaking</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Quicksand:wght@300;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #1a1a1a;
            --text-dim: #888;
            --glass: rgba(255, 255, 255, 0.7);
            --holo: linear-gradient(90deg, #7000ff, #ff00ff, #00ffff);
            --border: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            background: #fff;
            transition: background 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .holo-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f8faff, #fffcfc, #fcfcfc);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body.win-mode .holo-bg { 
            filter: saturate(4) brightness(0.3) blur(20px);
            transform: scale(1.2);
        }

        @keyframes auroraRotate {
            from { transform: translate(-50%, -50%) scale(1.5) rotate(0deg); }
            to { transform: translate(-50%, -50%) scale(1.5) rotate(360deg); }
        }

        /* Desktop Sidebar */
        aside {
            width: 320px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(23px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            height: 100vh;
            flex-shrink: 0;
            position: sticky;
            top: 0;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-style: italic;
            font-weight: 300;
            background: linear-gradient(90deg, #7000ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        /* Refined Aura Section (Editorial Style) */
        .aura-counter-wrap {
            margin-bottom: 60px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            width: 100%;
        }

        .aura-counter-wrap:hover {
            border-color: #7000ff;
        }

        .aura-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 0;
            opacity: 0.6;
        }

        .aura-reset-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
            gap: 20px;
        }

        .aura-counter-wrap .aura-reset-overlay {
            border-radius: 0;
        }

        .mobile-aura-wrap .aura-reset-overlay {
            border-radius: 30px;
            gap: 15px;
            padding: 0 10px;
            background: rgba(255, 255, 255, 0.9);
        }

        .aura-counter-wrap .aura-reset-msg {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7000ff;
            margin-bottom: 0;
        }

        .aura-confirm, .aura-cancel {
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .aura-confirm:hover { transform: scale(1.1); background: rgba(0, 255, 204, 0.1); }
        .aura-cancel:hover { transform: scale(1.1); background: rgba(255, 77, 77, 0.1); }

        .aura-confirm { color: #00b38f; }
        .aura-cancel { color: #ff4d4d; }

        .aura-counter-wrap.show-reset .aura-reset-overlay,
        .mobile-aura-wrap.show-reset .aura-reset-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .aura-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 10px;
        }

        #aura-total {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-style: italic;
            font-weight: 300;
            color: #7000ff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(112, 0, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #aura-total.pop {
            animation: counterPop 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes counterPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: #ff00ff; text-shadow: 0 0 30px rgba(255, 0, 255, 0.6); }
            100% { transform: scale(1); }
        }

        /* Collapsible Filters */
        .filter-section {
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .choice-trigger {
            padding: 15px 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .choice-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 8px;
        }

        .choice-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s;
            width: 100%;
        }

        .choice-value span:last-child {
            font-family: 'Quicksand', sans-serif;
            font-style: normal;
            font-size: 1.2rem;
            opacity: 0.3;
            transition: transform 0.4s;
        }

        .choice-trigger.active .choice-value span:last-child {
            transform: rotate(180deg);
        }

        .choice-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding-left: 5px;
        }

        .choice-menu.open {
            max-height: 300px;
            padding-bottom: 20px;
        }

        .choice-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
        }

        .choice-option:hover { color: var(--text); }
        .choice-option input { appearance: none; width: 14px; height: 14px; border: 1px solid var(--border); border-radius: 2px; position: relative; cursor: pointer; }
        .choice-option input:checked { background: #7000ff; border-color: #7000ff; }
        .choice-option input:checked::after { content: "✓"; color: #fff; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .choice-option.active-text { color: #7000ff; font-weight: 600; }

        /* Tooltip Style */
        .choice-option[data-tooltip] { position: relative; }
        .choice-option[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 15px); top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: #2c2c3d;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            width: 200px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 200;
            line-height: 1.4;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid rgba(112, 0, 255, 0.1);
            text-align: left;
        }
        .choice-option[data-tooltip]:hover::after { opacity: 1; transform: translateY(-50%) translateX(5px); }

        .resources-link {
            margin-top: auto;
            font-size: 0.7rem;
            color: #7000ff;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: color 0.3s, opacity 0.3s;
            padding-bottom: 20px;
            display: inline-block;
        }
        .resources-link:hover { opacity: 0.7; }

        /* Main Workspace */
        main {
            flex: 1;
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            min-width: 0;
        }

        .canvas {
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 100px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 60px 80px;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
        }

        .canvas.bloom {
            box-shadow: 0 50px 150px rgba(112, 0, 255, 0.4), 0 0 100px rgba(0, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.95);
            border-color: #fff;
        }

        .canvas::before {
            content: "";
            position: absolute;
            top: 0; left: 5%; width: 90%; height: 1px;
            background: linear-gradient(90deg, transparent, #7000ff, #ff00ff, #00ffff, transparent);
        }

        .bookmark-timer {
            margin: 0 auto 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 20;
        }

        .time-adjust { background: transparent; border: none; color: var(--text-dim); font-size: 1.6rem; cursor: pointer; opacity: 0.4; line-height: 1; padding: 0; width: 30px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .time-adjust:hover { opacity: 1; color: #7000ff; }
        .time-adjust:disabled { visibility: hidden; }
        .time-adjust.hidden { visibility: hidden; pointer-events: none; transition: none !important; }

        #btn-reset-icon { font-size: 1.1rem; display: none; }
        #btn-reset-icon.active { display: flex; }

        .timer-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .timer-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
            overflow: visible;
        }

        .timer-track {
            fill: none;
            stroke: var(--border);
            stroke-width: 2;
        }

        .timer-bar {
            fill: none;
            stroke: #7000ff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
            filter: drop-shadow(0 0 10px rgba(112, 0, 255, 0.4));
        }

        .timer-bar.no-transition {
            transition: none !important;
        }

        .timer.warning + .timer-svg .timer-bar {
            stroke: #ff007f;
            filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.6));
        }

        .timer { font-family: 'Quicksand', sans-serif; font-size: 2.2rem; font-weight: 500; color: var(--text-dim); transition: all 0.5s; opacity: 0.3; text-align: center; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; z-index: 5; }
        .timer.active { color: #7000ff; opacity: 1; }
        .timer.warning { color: #ff007f; }

        #topic-text { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2.8rem; 
            font-weight: 300; 
            font-style: italic; 
            line-height: 1.1; 
            color: var(--text); 
            transition: all 0.8s ease;
            text-align: center;
        }

        .welcome-beat {
            animation: topicEntrance 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes topicEntrance {
            0% { opacity: 0; transform: translateY(10px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .bloom #topic-text {
            text-shadow: 0 0 20px rgba(112, 0, 255, 0.3);
        }

        .topic-wrap { 
            position: relative; 
            width: 100%; 
            min-height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        #btn-reroll {
            display: none;
            position: absolute;
            right: -60px; 
            top: 15px; 
            --base-trans: none;
            transform: var(--base-trans);
            background: none; border: none;
            color: #7000ff; font-size: 2.2rem; cursor: pointer;
            opacity: 0.4; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 10px;
            z-index: 100;
        }
        #btn-reroll:hover { opacity: 1; transform: var(--base-trans) scale(1.1); }
        #btn-reroll.active { display: block; }
        #btn-reroll.spinning { animation: spinOnce 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        @keyframes spinOnce {
            0% { transform: var(--base-trans) rotate(0deg); }
            100% { transform: var(--base-trans) rotate(360deg); }
        }

        #win-message {
            position: absolute;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            width: auto;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            color: #7000ff;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }

        #win-message.show {
            display: flex;
            animation: auraPop 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards,
                       auraGlow 2s ease-in-out infinite 0.8s;
        }

        #win-message.fade-out {
            animation: auraFadeOut 0.5s ease-in forwards;
        }

        @keyframes auraFadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-10px); }
        }

        @keyframes auraPop {
            0% { transform: translateX(-50%) translateY(20px) scale(0.5); opacity: 0; }
            45% { transform: translateX(-50%) translateY(-10px) scale(1.1); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        }

        @keyframes auraGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(112, 0, 255, 0.4), 0 0 20px rgba(255, 0, 255, 0.2); }
            50% { text-shadow: 0 0 25px rgba(112, 0, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.6), 0 0 60px rgba(0, 255, 255, 0.4); color: #ff00ff; }
        }

        .action-bar { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 15px; }
        .btn-editorial { font-family: 'Quicksand', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; padding: 14px 0; background: #1a1a1a; color: #fff; border: 1.5px solid transparent; cursor: pointer; transition: all 0.3s; width: 200px; text-align: center; }
        .btn-editorial:hover { border-image: linear-gradient(90deg, #7000ff, #ff00ff, #00ffff) 1; box-shadow: 0 0 20px rgba(112, 0, 255, 0.3); }
        .btn-editorial:active { transform: scale(0.98); }
        .btn-editorial:disabled { 
            opacity: 0.15; 
            cursor: not-allowed; 
            filter: grayscale(1); 
            border: 1px solid var(--border) !important;
            background: transparent !important;
            color: var(--text-dim) !important;
            box-shadow: none !important;
            pointer-events: none;
        }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); width: 150px; }
        .btn-secondary:hover { border-image: var(--holo) 1; color: #7000ff; }

        /* Settings Toggle Header (Mobile only) */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 500;
            padding: 0 25px;
            align-items: center;
            justify-content: space-between;
        }

        .settings-toggle {
            font-size: 0.7rem;
            color: #7000ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* Mobile Aura Floating Pill */
        .mobile-aura-wrap {
            display: none;
            position: fixed;
            top: 85px;
            right: 20px;
            z-index: 1001;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(112, 0, 255, 0.15);
            box-shadow: 0 10px 25px rgba(112, 0, 255, 0.1);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .aura-reset-hint {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #7000ff;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .mobile-aura-wrap:hover .aura-reset-hint {
            opacity: 1;
        }

        .mobile-aura-wrap .aura-reset-overlay {
            border-radius: 30px;
            flex-direction: row;
            gap: 15px;
            padding: 0 10px;
            background: rgba(255, 255, 255, 0.9);
        }

        .mobile-aura-wrap .aura-confirm, 
        .mobile-aura-wrap .aura-cancel {
            width: 44px;
            height: 44px;
            font-size: 1.4rem;
            border-radius: 50%;
        }

        #aura-mobile {
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #7000ff;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #aura-mobile.pop {
            animation: counterPopMobile 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes counterPopMobile {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #ff00ff; }
            100% { transform: scale(1); }
        }

        .method-hint {
            display: block;
            text-align: center;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 25px;
            opacity: 0.5;
            font-family: 'Space Mono', monospace;
        }

        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .mobile-header { display: flex; }
            .mobile-aura-wrap { display: flex; }
            
            aside {
                position: fixed;
                top: 0; left: 0;
                width: 300px;
                height: 100vh;
                transform: translateX(-100%);
                transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
                box-shadow: 30px 0 60px rgba(0,0,0,0.1);
                z-index: 2000;
            }
            aside.open { transform: translateX(0); }

            .sidebar-nav { overflow-y: auto; flex: 1; }

            main { padding: 80px 20px 20px 20px; }
            .canvas { padding: 60px 20px 20px 25px; min-height: 220px; border: none; background: transparent; box-shadow: none; }
            #topic-text { font-size: 1.6rem; text-align: center; margin-bottom: 15px; }
            
            .topic-wrap { 
                flex-direction: column; 
                min-height: 140px; 
                justify-content: flex-start; 
                padding-top: 5px;
                padding-bottom: 50px;
            }

            #btn-reroll {
                position: absolute;
                bottom: 0;
                left: 50%;
                right: auto;
                top: auto;
                --base-trans: translateX(-50%);
                transform: var(--base-trans);
                margin: 0;
                width: 44px;
                height: 44px;
                display: none;
                align-items: center;
                justify-content: center;
            }
            #btn-reroll.active { display: flex; }
            #btn-reroll:hover { transform: var(--base-trans) scale(1.1); }
            
            .bookmark-timer { position: relative; right: auto; top: auto; width: 100%; height: auto; border: none; margin-bottom: 30px; background: transparent; }
            
            #win-message {
                position: absolute;
                top: 25px;
                left: 50%;
                transform: translateX(-50%) translateY(10px);
                width: 100%;
                justify-content: center;
                margin-bottom: 0;
            }
            body.win-mode #win-message { 
                transform: translateX(-50%) translateY(0); 
            }

            .timer { font-size: 1.6rem; opacity: 1; color: #7000ff; }
            .action-bar { width: 100%; bottom: 0; right: 0; display: flex; flex-direction: column; gap: 12px; padding: 0; position: relative; margin-top: 40px; }
            .btn-editorial { padding: 12px 20px; font-size: 0.7rem; width: 100%; text-align: center; }
            .btn-secondary { width: 100%; }
            
            .overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.2);
                backdrop-filter: blur(4px);
                z-index: 1500;
            }
            .overlay.active { display: block; }
        }
    </style>
</head>
<body>

<div class="mobile-header">
    <a href="index.html" style="text-decoration: none;">
        <div class="logo" style="margin-bottom: 0; font-size: 1.4rem;">SpeechLab.</div>
    </a>
    <div class="settings-toggle" id="toggle-settings">Filters</div>
</div>

<div class="mobile-aura-wrap" id="aura-wrap-mobile">
    <span class="aura-label" style="margin-bottom: 0; margin-right: 8px; display: inline-block;">Aura</span>
    <span id="aura-mobile">0</span>
    <span class="aura-reset-hint">↻</span>
    <div class="aura-reset-overlay">
        <div style="display: flex; gap: 15px;">
            <span class="aura-confirm" title="Reset Aura">✓</span>
            <span class="aura-cancel" title="Cancel">✕</span>
        </div>
    </div>
</div>

<div class="overlay" id="sidebar-overlay"></div>

<div class="holo-bg"></div>

<aside id="main-sidebar">
    <a href="index.html" style="text-decoration: none;">
        <div class="logo">SpeechLab</div>
    </a>
    
    <div class="sidebar-nav">
        <div class="aura-counter-wrap" id="aura-wrap-desktop">
            <span class="aura-label">Total Aura</span>
            <div id="aura-total">0</div>
            <div class="aura-reset-overlay">
                <span class="aura-reset-msg">Reset Aura?</span>
                <div style="display: flex; gap: 20px;">
                    <span class="aura-confirm" title="Reset Aura">✓</span>
                    <span class="aura-cancel" title="Cancel">✕</span>
                </div>
            </div>
        </div>
        <div class="filter-section">
            <div class="choice-trigger" id="diff-trigger">
                <span class="choice-label">Experience Level</span>
                <div class="choice-value"><span id="val-diff">Beginner</span> <span>▾</span></div>
            </div>
            <div class="choice-menu" id="menu-diff">
                <label class="choice-option active-text"><input type="checkbox" class="diff-check" value="easy" checked> Beginner</label>
                <label class="choice-option"><input type="checkbox" class="diff-check" value="medium"> Intermediate</label>
                <label class="choice-option"><input type="checkbox" class="diff-check" value="hard"> Advanced</label>
            </div>
        </div>

        <div class="filter-section">
            <div class="choice-trigger" id="cat-trigger">
                <span class="choice-label">Context</span>
                <div class="choice-value"><span id="val-cat">All</span> <span>▾</span></div>
            </div>
            <div class="choice-menu" id="menu-cat">
                <label class="choice-option active-text"><input type="checkbox" class="cat-check" value="general" checked> General</label>
                <label class="choice-option active-text"><input type="checkbox" class="cat-check" value="tech" checked> Tech</label>
                <label class="choice-option active-text"><input type="checkbox" class="cat-check" value="corporate" checked> Corporate</label>
            </div>
        </div>

        <div class="filter-section">
            <div class="choice-trigger" id="goal-trigger">
                <span class="choice-label">Training Goal</span>
                <div class="choice-value"><span id="val-goal">Fluency</span> <span>▾</span></div>
            </div>
            <div class="choice-menu" id="menu-goal">
                <label class="choice-option active-text" data-tooltip="Speak without pauses or filler words like 'um' and 'ah'."><input type="checkbox" class="goal-check" value="fluency" checked> Fluency</label>
                <label class="choice-option" data-tooltip="Organize your thoughts into a clear Intro, Body, and Conclusion."><input type="checkbox" class="goal-check" value="structure"> Structure</label>
                <label class="choice-option" data-tooltip="Use persuasive language and vivid metaphors to win the room."><input type="checkbox" class="goal-check" value="rhetoric"> Rhetoric</label>
            </div>
        </div>
    </div>

    <a href="resources.html" target="_blank" class="resources-link">Resources</a>
</aside>

<main>
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="method-hint">Roll ↻ → Set Time → Start Speaking</div>
        <div class="canvas">
            <div id="win-message">Aura Gained</div>
        <div class="bookmark-timer">
            <div style="position: relative; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;">
                <button class="time-adjust" id="time-plus">+</button>
                <button class="time-adjust" id="btn-reset-icon" title="Reset Timer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">↺</button>
            </div>
            
            <div class="timer-container">
                <svg class="timer-svg" viewBox="0 0 100 100">
                    <circle class="timer-track" cx="50" cy="50" r="45"></circle>
                    <circle class="timer-bar" cx="50" cy="50" r="45"></circle>
                </svg>
                <div class="timer" id="timer-display">01:00</div>
            </div>

            <button class="time-adjust" id="time-minus">-</button>
        </div>

        <div class="topic-wrap">
            <div id="topic-text">Loading stage...</div>
            <button id="btn-reroll" class="active" title="Reroll Topic">↻</button>
        </div>

        <div class="action-bar">
            <button id="btn-main" class="btn-editorial">Start Speaking</button>
        </div>
        </div>
    </div>
</main>

<script>
    $(document).ready(function() {
        let topics = {};
        $.getJSON('topics.json', function(data) { topics = data; });

        let savedTime = parseInt(localStorage.getItem('speechSessionTimer')) || 60;
        let timeLeft = savedTime;
        let timer = null;
        let winTimeout = null;
        let isRunning = false;
        let topicSelected = false;

        // Mobile Settings Toggle
        $('#toggle-settings, #sidebar-overlay').click(function() {
            $('#main-sidebar').toggleClass('open');
            $('#sidebar-overlay').toggleClass('active');
        });

        // Close sidebar on navigation (mobile)
        $('.resources-link').click(function() {
            $('#main-sidebar').removeClass('open');
            $('#sidebar-overlay').removeClass('active');
        });

        // Accordion Logic
        $('.choice-trigger').click(function() {
            const $menu = $(this).next('.choice-menu');
            const $trigger = $(this);
            $('.choice-menu').not($menu).removeClass('open');
            $('.choice-trigger').not($trigger).removeClass('active');
            $menu.toggleClass('open');
            $trigger.toggleClass('active');
        });

        // Multi-Select Label Updates
        $('.diff-check, .cat-check, .goal-check').change(function() {
            const type = $(this).hasClass('diff-check') ? 'diff' : ($(this).hasClass('cat-check') ? 'cat' : 'goal');
            const checked = $(`.${type}-check:checked`);
            let label = checked.length === 3 ? 'All' : (checked.length === 0 ? 'None' : checked.map(function() { return $(this).parent().text().trim(); }).get().join(", "));
            $(`#val-${type}`).text(label);
            
            // Save filters to localStorage
            const selectedFilters = {
                diff: $('.diff-check:checked').map(function() { return this.value; }).get(),
                cat: $('.cat-check:checked').map(function() { return this.value; }).get(),
                goal: $('.goal-check:checked').map(function() { return this.value; }).get()
            };
            localStorage.setItem('speechSessionFilters', JSON.stringify(selectedFilters));

            // Auto-reload topic on filter change if not currently speaking
            if (!isRunning) {
                getNewTopic(true);
                $('#btn-main').text('Start Speaking');
            }
        });

        function loadFilters() {
            const saved = localStorage.getItem('speechSessionFilters');
            if (!saved) return;
            try {
                const filters = JSON.parse(saved);
                
                // Reset all to unchecked first
                $('.diff-check, .cat-check, .goal-check').prop('checked', false);
                
                // Apply saved states
                if (filters.diff) filters.diff.forEach(v => $(`.diff-check[value="${v}"]`).prop('checked', true));
                if (filters.cat) filters.cat.forEach(v => $(`.cat-check[value="${v}"]`).prop('checked', true));
                if (filters.goal) filters.goal.forEach(v => $(`.goal-check[value="${v}"]`).prop('checked', true));
                
                // Trigger label updates
                ['diff', 'cat', 'goal'].forEach(type => {
                    const checked = $(`.${type}-check:checked`);
                    let label = checked.length === 3 ? 'All' : (checked.length === 0 ? 'None' : checked.map(function() { return $(this).parent().text().trim(); }).get().join(", "));
                    $(`#val-${type}`).text(label);
                });
            } catch (e) { console.error("Error loading filters", e); }
        }

        function updateDisplay(snap = false) {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            $('#timer-display').text(`${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`);
            
            // Update Orbital Arch
            const initialTime = parseInt(localStorage.getItem('speechSessionTimer')) || 60;
            
            // Refined progress calculation to prevent early completion
            const progress = timeLeft / initialTime;
            const offset = 283 - (progress * 283);
            
            const $bar = $('.timer-bar');
            if (snap) {
                $bar.addClass('no-transition');
                $bar.css('stroke-dashoffset', 0); // Reset to full
                $bar[0].offsetHeight; 
                $bar.removeClass('no-transition');
            } else {
                $bar.css('stroke-dashoffset', offset);
            }

            if (timeLeft < 15 && timeLeft > 0) $('#timer-display').addClass('warning');
            else $('#timer-display').removeClass('warning');
        }

        $('#time-plus').click(function() { 
            timeLeft += 10;
            if (!topicSelected) localStorage.setItem('speechSessionTimer', timeLeft); 
            updateDisplay(); 
        });
        $('#time-minus').click(function() { 
            if (timeLeft > 10) {
                timeLeft -= 10;
                if (!topicSelected) localStorage.setItem('speechSessionTimer', timeLeft); 
                updateDisplay(); 
            } 
        });

        function getNewTopic(isWelcome = false) {
            const $text = $('#topic-text');
            const diffs = $('.diff-check:checked').map(function() { return this.value; }).get();
            const cats = $('.cat-check:checked').map(function() { return this.value; }).get();
            const goals = $('.goal-check:checked').map(function() { return this.value; }).get();
            let pool = [];
            diffs.forEach(d => { if(topics[d]) pool = pool.concat(topics[d]); });
            let filteredTopics = pool.filter(t => cats.includes(t.category) && goals.includes(t.goal));
            
            if (filteredTopics.length === 0) { 
                $text.html("No matches."); 
                topicSelected = false; 
                return false; 
            }
            
            const finalTopic = filteredTopics[Math.floor(Math.random() * filteredTopics.length)].text;
            topicSelected = true;
            
            if (isWelcome) {
                $text.html(finalTopic).addClass('welcome-beat');
                setTimeout(() => $text.removeClass('welcome-beat'), 1200);
            } else {
                $text.css({opacity: 0, filter: 'blur(10px)', color: 'var(--text)'});
                setTimeout(() => { $text.html(finalTopic).css({opacity: 1, filter: 'blur(0)'}); }, 400);
            }
            return true;
        }

        // Initial Load
        loadFilters();
        const savedAura = parseInt(localStorage.getItem('speechSessionAura')) || 0;
        $('#aura-total, #aura-mobile').text(savedAura);

        // Aura Reset Logic
        $('#aura-wrap-desktop, #aura-wrap-mobile').click(function(e) {
            const $wrap = $(this);
            const $target = $(e.target);

            if ($wrap.hasClass('show-reset')) {
                if ($target.hasClass('aura-confirm')) {
                    localStorage.setItem('speechSessionAura', 0);
                    $('#aura-total, #aura-mobile').text(0);
                    $wrap.removeClass('show-reset');
                } else if ($target.hasClass('aura-cancel')) {
                    $wrap.removeClass('show-reset');
                }
            } else {
                // Prevent showing reset if clicking the text/number while overlay is active
                if (!$target.closest('.aura-reset-overlay').length) {
                    $wrap.addClass('show-reset');
                    // Auto-hide after 5 seconds if no action
                    setTimeout(() => $wrap.removeClass('show-reset'), 5000);
                }
            }
        });

        $.getJSON('topics.json', function(data) { 
            topics = data; 
            getNewTopic(true);
            topicSelected = true;
        });

        $('#btn-reroll').click(function() {
            const $btn = $(this);
            $btn.addClass('spinning');
            setTimeout(() => $btn.removeClass('spinning'), 600);
            
            getNewTopic();
            $('#btn-main').text('Start Speaking');
        });

        $('#btn-main').click(function() {
            const $btn = $(this);

            // State 1: IDLE / READY -> Start Speaking
            if (!isRunning && ($btn.text() === 'Start Speaking')) {
                if (winTimeout) { clearTimeout(winTimeout); winTimeout = null; }
                $('body').removeClass('win-mode');
                $('.canvas').removeClass('bloom');
                
                $btn.text('Pause');
                $('#btn-reroll').removeClass('active');
                $('#timer-display').addClass('active');
                $('.time-adjust').prop('disabled', true);
                $('#time-plus, #time-minus').addClass('hidden');
                $('#btn-reset-icon').addClass('active').prop('disabled', false);
                
                isRunning = true;
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timer);
                        triggerWin();
                    }
                }, 1000);
                return;
            }

            // State 3: RUNNING -> Pause
            if (isRunning) {
                clearInterval(timer);
                isRunning = false;
                $btn.text('Resume');
                $('.time-adjust').prop('disabled', false);
                $('#time-plus, #time-minus').removeClass('hidden');
                $('#btn-reset-icon').removeClass('active');
                return;
            }

            // State 4: PAUSED -> Resume
            if (!isRunning && $btn.text() === 'Resume') {
                $btn.text('Pause');
                isRunning = true;
                $('.time-adjust').prop('disabled', true);
                $('#time-plus, #time-minus').addClass('hidden');
                $('#btn-reset-icon').addClass('active').prop('disabled', false);
                
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timer);
                        triggerWin();
                    }
                }, 1000);
                return;
            }
        });

        function triggerWin() {
            const phrases = [
                "Aura +10",
                "Maximum Aura Attained",
                "Total Glow Up",
                "Main Character Energy",
                "Radiant Performance",
                "Elegance Level Up",
                "Front Page Worthy",
                "Voice Refined",
                "Cognitive Flow State",
                "Absolute Clarity",
                "Speech Polished",
                "Neural Pathways Ignited",
                "Iconic Energy"
            ];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            const $winMsg = $('#win-message');
            $winMsg.text(randomPhrase).removeClass('fade-out').addClass('show');

            // Aura Increment Logic
            let currentAura = parseInt(localStorage.getItem('speechSessionAura')) || 0;
            currentAura += 10;
            localStorage.setItem('speechSessionAura', currentAura);
            
            // Trigger Counter Pop
            const $auraTotal = $('#aura-total, #aura-mobile');
            $auraTotal.text(currentAura).addClass('pop');
            setTimeout(() => $auraTotal.removeClass('pop'), 600);

            if (winTimeout) { clearTimeout(winTimeout); winTimeout = null; }
            
            // Background Pulse (1.5s)
            $('.canvas').addClass('bloom');
            setTimeout(() => {
                $('.canvas').removeClass('bloom');
            }, 1500);

            // Message Visibility (4s total)
            winTimeout = setTimeout(() => {
                $winMsg.addClass('fade-out');
                setTimeout(() => {
                    $winMsg.removeClass('show fade-out');
                    winTimeout = null;
                }, 500);
            }, 3500);

            // Auto-load next topic after win
            getNewTopic(true);
            $('#btn-main').text('Start Speaking');
            $('#btn-reroll').addClass('active');
            
            // Reset timer for next round
            timeLeft = parseInt(localStorage.getItem('speechSessionTimer')) || 60;
            updateDisplay(true);
            $('#timer-display').removeClass('active');

            $('.time-adjust').prop('disabled', false); 
            $('#time-plus, #time-minus').removeClass('hidden'); $('#btn-reset-icon').removeClass('active');
            isRunning = false;
            topicSelected = true;
        }

        $('#btn-reset-icon').click(function() {
            clearInterval(timer); 
            if (winTimeout) { clearTimeout(winTimeout); winTimeout = null; }
            isRunning = false;
            $('.canvas').removeClass('bloom');
            $('#btn-main').text('Start Speaking');
            $('#btn-reroll').addClass('active');
            timeLeft = parseInt(localStorage.getItem('speechSessionTimer')) || 60;
            updateDisplay(true);
            $('.time-adjust').prop('disabled', false);
            $('#time-plus, #time-minus').removeClass('hidden'); $(this).removeClass('active');
            $('#timer-display').removeClass('active');
        });

        updateDisplay();
    });
</script>
</body>
